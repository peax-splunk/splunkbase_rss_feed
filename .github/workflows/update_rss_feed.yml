name: Update and publish RSS feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Added a timeout to prevent the job from hanging for hours if a network request fails
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Automatically caches pip dependencies to speed up the "Install dependencies" step
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate RSS feed
        run: python splunkbase_rss_feed.py

      - name: Prepare deployment directory
        run: |
          mkdir -p public
          # Added a check to see if the file actually exists
          if [ -f rss.xml ]; then
            mv rss.xml public/
          else
            echo "Error: rss.xml was not generated!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: rss_feed
          commit_message: 'Update Splunkbase Apps RSS feed [Automated Update from workflow]'