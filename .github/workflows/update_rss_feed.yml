name: Update and publish RSS feed

on:
  schedule:
    - cron: '14 * * * *'
  workflow_dispatch: 

jobs:
  debug-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Check
        run: |
          echo "Workflow triggered at: $(date)"
          echo "Trigger event: ${{ github.event_name }}"

  build-and-deploy:
    needs: debug-trigger
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate RSS feed
        run: python splunkbase_rss_feed.py

      - name: Prepare deployment directory
        run: |
          mkdir -p public
          # Added a check to see if the file actually exists
          if [ -f rss.xml ]; then
            mv rss.xml public/
          else
            echo "Error: rss.xml was not generated!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: 'Update Splunkbase Apps RSS feed [Automated Update from workflow]'